groups:
  - name: evmanager-container-alerts
    rules:
      - alert: EVManagerContainerDown
        expr: absent(container_last_seen{name=~"evmanager.*"}) or time() - container_last_seen{name=~"evmanager.*"} > 120
        for: 0m
        labels:
          severity: critical
          project: evmanager
        annotations:
          summary: "EVManager container is down for more than 2 minutes"
          description: "A container matching evmanager.* has not reported metrics for more than 120 seconds. Short rebuilds under 2 minutes are ignored."

      - alert: EVManagerHighContainerCpu
        expr: sum by (name) (rate(container_cpu_usage_seconds_total{name=~"evmanager.*"}[5m])) > 0.85
        for: 5m
        labels:
          severity: warning
          project: evmanager
        annotations:
          summary: "High CPU usage on {{ $labels.name }}"
          description: "Container CPU usage has been above 85% for at least 5 minutes."

      - alert: EVManagerHighContainerMemory
        expr: container_memory_working_set_bytes{name=~"evmanager.*"} / container_spec_memory_limit_bytes{name=~"evmanager.*"} > 0.85
        for: 5m
        labels:
          severity: warning
          project: evmanager
        annotations:
          summary: "High memory usage on {{ $labels.name }}"
          description: "Container memory usage has been above 85% for at least 5 minutes."

  - name: evmanager-traffic-alerts
    rules:
      - alert: EVManagerHighErrorRate
        expr: |
          (
            sum(rate(http_requests_total{status=~"5.."}[5m]))
            /
            clamp_min(sum(rate(http_requests_total[5m])), 1)
          ) > 0.05
        for: 5m
        labels:
          severity: critical
          project: evmanager
        annotations:
          summary: "EVManager high HTTP 5xx error rate"
          description: "More than 5% of requests are HTTP 5xx errors over the last 5 minutes."

      - alert: EVManagerSlowRequests
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(http_request_duration_seconds_bucket[5m])) by (le)
          ) > 1
        for: 5m
        labels:
          severity: warning
          project: evmanager
        annotations:
          summary: "EVManager slow HTTP requests"
          description: "HTTP p95 latency is above 1 second for at least 5 minutes."

  - name: evmanager-db-alerts
    rules:
      - alert: EVManagerSlowDatabaseQueries
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(db_query_duration_seconds_bucket[5m])) by (le)
          ) > 0.5
        for: 5m
        labels:
          severity: warning
          project: evmanager
        annotations:
          summary: "EVManager slow database queries"
          description: "Database query p95 latency is above 500ms for at least 5 minutes."

      - alert: EVManagerHighDatabaseQueryRate
        expr: sum(rate(db_queries_total[5m])) > 100
        for: 5m
        labels:
          severity: warning
          project: evmanager
        annotations:
          summary: "EVManager high database query rate"
          description: "Database query rate is above 100 queries per second for at least 5 minutes."
