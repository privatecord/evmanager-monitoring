global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080

  # Adjust this target to the real EVManager app service/container.
  - job_name: evmanager-app
    metrics_path: /metrics
    static_configs:
      - targets:
          - evmanager-app:3000
    relabel_configs:
      - target_label: project
        replacement: evmanager
